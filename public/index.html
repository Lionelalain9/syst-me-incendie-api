<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Système de Détection Incendie — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --fire1:   #e65c00;
      --fire2:   #f9a825;
      --ember:   #ff3d00;
      --green:   #00e676;
      --bg:      #0c0a06;
      --surface: #1a1208;
      --surface2:#231808;
      --border:  #2e1f0a;
      --text:    #f5e6d0;
      --muted:   #7a5c38;
      --radius:  14px;
      --error:   #ff5252;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(230,92,0,.15) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 90%, rgba(249,168,37,.07) 0%, transparent 50%);
    }

    .screen { display: none; position: relative; z-index: 1; }
    .screen.active { display: block; }

    #screen-auth {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }

    .auth-box {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      position: relative; overflow: hidden;
    }
    .auth-box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--fire1), var(--fire2), var(--fire1));
    }

    .auth-logo {
      text-align: center; margin-bottom: 2rem;
    }
    .auth-logo .fire-icon { font-size: 3rem; animation: flicker 2.5s infinite; display: block; margin-bottom: .5rem; }
    @keyframes flicker { 0%,100%{opacity:1} 40%{opacity:.5} 80%{opacity:.3} }
    .auth-logo h1 {
      font-size: 1.1rem; font-weight: 900; letter-spacing: 1px;
      background: linear-gradient(135deg, var(--fire2), var(--fire1));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .auth-logo p { font-size: .72rem; color: var(--muted); letter-spacing: 2px; margin-top: .3rem; font-family: 'Share Tech Mono', monospace; }

    .auth-tabs {
      display: flex; background: var(--surface2); border-radius: 10px;
      padding: 4px; margin-bottom: 1.8rem; gap: 4px;
    }
    .auth-tab {
      flex: 1; padding: .6rem; border-radius: 7px; border: none;
      background: transparent; color: var(--muted);
      font-family: 'Exo 2', sans-serif; font-size: .88rem; font-weight: 700;
      cursor: pointer; transition: all .25s; letter-spacing: .5px;
    }
    .auth-tab.active {
      background: linear-gradient(135deg, var(--fire1), var(--fire2));
      color: #fff; box-shadow: 0 2px 12px rgba(230,92,0,.3);
    }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block; font-size: .78rem; font-weight: 600;
      color: var(--muted); margin-bottom: .4rem; letter-spacing: .5px;
    }
    .form-input {
      width: 100%; padding: .75rem 1rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Exo 2', sans-serif; font-size: .95rem;
      outline: none;
    }
    .form-input:focus { border-color: var(--fire1); box-shadow: 0 0 0 3px rgba(230,92,0,.15); }

    .btn-auth {
      width: 100%; padding: .85rem; border: none; border-radius: 11px;
      background: linear-gradient(135deg, var(--fire1), var(--fire2));
      color: #fff; font-family: 'Exo 2', sans-serif;
      font-size: 1rem; font-weight: 700; letter-spacing: 1px;
      cursor: pointer; transition: all .2s;
      margin-top: .5rem;
    }
    .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(230,92,0,.45); }

    .auth-msg {
      text-align: center; font-size: .82rem; color: var(--error);
      margin-top: .8rem; min-height: 1.2rem;
    }
    .auth-msg.success { color: var(--green); }

    .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--fire1); border-radius:50%; animation:spin .7s linear infinite; margin:1rem auto; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div id="screen-auth" class="screen active">
  <div class="auth-box">
    <div class="auth-logo">
      <span class="fire-icon">🔥</span>
      <h1>SYSTÈME DE DÉTECTION INCENDIE</h1>
      <p>PLATEFORME IoT — SURVEILLANCE CONNECTÉE</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('connexion')">Se connecter</button>
      <button class="auth-tab" onclick="switchTab('inscription')">Créer un compte</button>
    </div>

    <div class="auth-form active" id="form-connexion">
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <input type="email" class="form-input" id="login-email" placeholder="votre@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="login-mdp" placeholder="••••••••"/>
      </div>
      <button class="btn-auth" onclick="seConnecter()">🔐 Se connecter</button>
      <div class="auth-msg" id="msg-login"></div>
    </div>

    <div class="auth-form" id="form-inscription">
      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <input type="text" class="form-input" id="reg-nom" placeholder="Jean Dupont"/>
      </div>
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <input type="email" class="form-input" id="reg-email" placeholder="votre@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe (min. 8 caractères)</label>
        <input type="password" class="form-input" id="reg-mdp" placeholder="••••••••"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input type="password" class="form-input" id="reg-mdp2" placeholder="••••••••"/>
      </div>
      <button class="btn-auth" onclick="sInscrire()">✅ Créer mon compte</button>
      <div class="auth-msg" id="msg-register"></div>
    </div>
  </div>
</div>

<script>
  const API = 'https://sdi-api-0fsx.onrender.com';

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='connexion')||(i===1&&tab==='inscription')));
    document.getElementById('form-connexion').classList.toggle('active', tab==='connexion');
    document.getElementById('form-inscription').classList.toggle('active', tab==='inscription');
  }

  async function seConnecter() {
    const email = document.getElementById('login-email').value.trim();
    const mdp   = document.getElementById('login-mdp').value;
    const msg   = document.getElementById('msg-login');

    if (!email || !mdp) { msg.textContent = 'Veuillez remplir tous les champs.'; return; }

    try {
      const r = await fetch(`${API}/api/auth/connexion`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, mot_de_passe: mdp })
      });
      const d = await r.json();
      if (!r.ok) { msg.textContent = d.erreur || 'Erreur de connexion.'; return; }

      localStorage.setItem('sdi_token', d.token);
      localStorage.setItem('sdi_user', JSON.stringify(d.user));
      msg.textContent = '✅ Connexion réussie !';
      msg.classList.add('success');
      setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
    } catch(e) {
      msg.textContent = 'Serveur inaccessible.';
    }
  }

  async function sInscrire() {
    const nom  = document.getElementById('reg-nom').value.trim();
    const email= document.getElementById('reg-email').value.trim();
    const mdp  = document.getElementById('reg-mdp').value;
    const mdp2 = document.getElementById('reg-mdp2').value;
    const msg  = document.getElementById('msg-register');

    if (!nom||!email||!mdp) { msg.textContent = 'Veuillez remplir tous les champs.'; return; }
    if (mdp !== mdp2) { msg.textContent = 'Les mots de passe ne correspondent pas.'; return; }
    if (mdp.length < 8) { msg.textContent = 'Mot de passe trop court (min. 8).'; return; }

    try {
      const r = await fetch(`${API}/api/auth/inscription`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ nom, email, mot_de_passe: mdp })
      });
      const d = await r.json();
      if (!r.ok) { msg.textContent = d.erreur || 'Erreur inscription.'; return; }

      localStorage.setItem('sdi_token', d.token);
      localStorage.setItem('sdi_user', JSON.stringify(d.user));
      msg.textContent = `✅ Bienvenue ${nom} !`;
      msg.classList.add('success');
      setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
    } catch(e) {
      msg.textContent = 'Serveur inaccessible.';
    }
  }
</script>
</body>
</html>
