<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIDIRT — Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c1f, #1a1a2e);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .auth-box {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .auth-box h1 { text-align: center; margin-bottom: 1.5rem; color: #e65c00; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.3rem; font-size: 0.8rem; color: #aaa; }
    input {
      width: 100%;
      padding: 0.7rem;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1e1e2e;
      color: white;
    }
    button {
      width: 100%;
      padding: 0.7rem;
      background: linear-gradient(135deg, #e65c00, #ff8c42);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .toggle-buttons {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .toggle-buttons button {
      background: transparent;
      border: 1px solid #e65c00;
      color: #e65c00;
    }
    .toggle-buttons button.active {
      background: #e65c00;
      color: white;
    }
    .msg { margin-top: 1rem; text-align: center; font-size: 0.8rem; color: #ff6666; }
    .msg.success { color: #66ff66; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="auth-box">
  <h1>🔥 SIDIRT</h1>
  <div class="toggle-buttons">
    <button id="btn-connexion" class="active" onclick="showForm('connexion')">Se connecter</button>
    <button id="btn-inscription" onclick="showForm('inscription')">Créer un compte</button>
  </div>

  <div id="form-connexion">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="votre@email.com">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button onclick="seConnecter()">Se connecter</button>
  </div>

  <div id="form-inscription" class="hidden">
    <div class="form-group">
      <label>Nom</label>
      <input type="text" id="reg-nom" placeholder="Jean Dupont">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="votre@email.com">
    </div>
    <div class="form-group">
      <label>Mot de passe (min. 8 caractères)</label>
      <input type="password" id="reg-password" placeholder="••••••••">
    </div>
    <button onclick="sInscrire()">Créer mon compte</button>
  </div>

  <div id="message" class="msg"></div>
</div>

<script>
  const API_URL = 'https://sdi-api-0fsx.onrender.com';

  function showForm(form) {
    if (form === 'connexion') {
      document.getElementById('form-connexion').classList.remove('hidden');
      document.getElementById('form-inscription').classList.add('hidden');
      document.getElementById('btn-connexion').classList.add('active');
      document.getElementById('btn-inscription').classList.remove('active');
    } else {
      document.getElementById('form-connexion').classList.add('hidden');
      document.getElementById('form-inscription').classList.remove('hidden');
      document.getElementById('btn-inscription').classList.add('active');
      document.getElementById('btn-connexion').classList.remove('active');
    }
  }

  async function seConnecter() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const msgDiv = document.getElementById('message');

    try {
      const res = await fetch(`${API_URL}/api/auth/connexion`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, mot_de_passe: password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.erreur || 'Erreur');
      localStorage.setItem('sdi_token', data.token);
      localStorage.setItem('sdi_user', JSON.stringify(data.user));
      window.location.href = '/dashboard.html';
    } catch (err) {
      msgDiv.textContent = err.message;
      msgDiv.classList.remove('success');
    }
  }

  async function sInscrire() {
    const nom = document.getElementById('reg-nom').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;
    const msgDiv = document.getElementById('message');

    if (password.length < 8) {
      msgDiv.textContent = 'Mot de passe trop court (min. 8 caractères)';
      return;
    }

    try {
      const res = await fetch(`${API_URL}/api/auth/inscription`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom, email, mot_de_passe: password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.erreur || 'Erreur');
      localStorage.setItem('sdi_token', data.token);
      localStorage.setItem('sdi_user', JSON.stringify(data.user));
      window.location.href = '/dashboard.html';
    } catch (err) {
      msgDiv.textContent = err.message;
      msgDiv.classList.remove('success');
    }
  }
</script>
</body>
</html>
