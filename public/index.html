<!DOCTYPE html>
<html lang="fr" data-theme="night">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#e65c00"/>
  <link rel="manifest" href="manifest.json"/>
  <title>SIDIRT — Système Intelligent de Détection d'Incendie en Temps Réel</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    [data-theme="night"]{--fire1:#e65c00;--fire2:#f9a825;--ember:#ff3d00;--green:#00e676;--bg:#0a0e1a;--surface:#111827;--surface2:#1a2236;--border:#1e2d45;--text:#e2e8f0;--muted:#4a6080;--error:#ff5252;}
    [data-theme="dark"]{--fire1:#e65c00;--fire2:#f9a825;--ember:#ff3d00;--green:#00e676;--bg:#0c0a06;--surface:#1a1208;--surface2:#231808;--border:#2e1f0a;--text:#f5e6d0;--muted:#7a5c38;--error:#ff5252;}
    [data-theme="light"]{--fire1:#e65c00;--fire2:#f9a825;--ember:#ff3d00;--green:#00c853;--bg:#f0f4f8;--surface:#ffffff;--surface2:#f8fafc;--border:#e2e8f0;--text:#1e293b;--muted:#94a3b8;--error:#d32f2f;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;transition:background .3s,color .3s}
    #app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

    /* AUTH */
    #screen-auth{display:none;position:fixed;inset:0;z-index:200;background:#0c0a06;align-items:center;justify-content:center;padding:1.5rem;overflow-y:auto}
    #screen-auth.active{display:flex}
    .auth-box{width:100%;max-width:420px;background:#1a1208;border:1px solid #2e1f0a;border-radius:20px;padding:2.2rem 2rem;position:relative;overflow:hidden}
    .auth-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e65c00,#f9a825,#e65c00)}
    .auth-logo{text-align:center;margin-bottom:1.8rem}
    .flame-svg-wrap{display:flex;justify-content:center;margin-bottom:.8rem;filter:drop-shadow(0 0 18px rgba(255,109,0,.7));animation:flame-pulse 1.8s ease-in-out infinite}
    .flame-svg{width:65px;height:82px}
    .flame-outer{animation:flicker-out 1.2s ease-in-out infinite alternate;transform-origin:center bottom}
    .flame-inner{animation:flicker-in 0.9s ease-in-out infinite alternate;transform-origin:center bottom}
    .flame-core{animation:core-pulse 1s ease-in-out infinite alternate}
    @keyframes flame-pulse{0%,100%{filter:drop-shadow(0 0 18px rgba(255,109,0,.7));transform:scaleY(1)}50%{filter:drop-shadow(0 0 30px rgba(255,60,0,.9));transform:scaleY(1.04)}}
    @keyframes flicker-out{0%{transform:scaleX(1) skewX(0deg)}33%{transform:scaleX(1.04) skewX(-2deg)}66%{transform:scaleX(.97) skewX(1deg)}100%{transform:scaleX(1.02) skewX(2deg)}}
    @keyframes flicker-in{0%{transform:scaleX(1) skewX(1deg);opacity:.9}50%{transform:scaleX(1.06) skewX(-3deg);opacity:1}100%{transform:scaleX(.95) skewX(2deg);opacity:.85}}
    @keyframes core-pulse{0%{opacity:.5}100%{opacity:.8}}
    .auth-logo h1{font-size:.88rem;font-weight:900;letter-spacing:1.5px;line-height:1.5;background:linear-gradient(135deg,#fff176,#ff6d00,#b71c1c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .auth-logo p{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:#7a5c38;letter-spacing:2px;margin-top:.3rem}
    .auth-tabs{display:flex;background:#231808;border-radius:10px;padding:4px;margin-bottom:1.5rem;gap:4px}
    .auth-tab{flex:1;padding:.55rem;border-radius:7px;border:none;background:transparent;color:#7a5c38;font-family:'Exo 2',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .25s}
    .auth-tab.active{background:linear-gradient(135deg,#e65c00,#f9a825);color:#fff}
    .auth-form{display:none}.auth-form.active{display:block}
    .form-group{margin-bottom:1rem}
    .form-label{display:block;font-size:.75rem;font-weight:600;color:#7a5c38;margin-bottom:.35rem}
    .input-wrap{position:relative}
    .form-input{width:100%;padding:.72rem 1rem;background:#231808;border:1px solid #2e1f0a;border-radius:10px;color:#f5e6d0;font-family:'Exo 2',sans-serif;font-size:.92rem;outline:none;transition:border-color .25s,box-shadow .25s}
    .form-input:focus{border-color:#e65c00;box-shadow:0 0 0 3px rgba(230,92,0,.15)}
    .form-input::placeholder{color:#7a5c38}
    .eye-btn{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#7a5c38;font-size:1rem;padding:0;transition:color .2s}
    .eye-btn:hover{color:#e65c00}
    .btn-auth{width:100%;padding:.82rem;border:none;border-radius:11px;background:linear-gradient(135deg,#e65c00,#f9a825);color:#fff;font-family:'Exo 2',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(230,92,0,.35);margin-top:.4rem}
    .btn-auth:active{transform:scale(.98)}.btn-auth:disabled{opacity:.6;cursor:not-allowed}
    .auth-msg{text-align:center;font-size:.8rem;color:#ff5252;margin-top:.7rem;min-height:1.2rem}
    .auth-msg.success{color:#00e676}

    /* DASHBOARD */
    #screen-dashboard{display:none;flex-direction:column;height:100%}
    #screen-dashboard.active{display:flex}
    #banner{display:none;flex-shrink:0;background:linear-gradient(90deg,var(--ember),var(--fire1),var(--ember));background-size:200%;color:#fff;text-align:center;padding:.5rem;font-weight:700;font-size:.8rem;letter-spacing:2px;animation:slide-bg 1.5s linear infinite,blink .5s infinite}
    @keyframes slide-bg{0%{background-position:0%}100%{background-position:200%}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.7}}
    .dash-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.2rem;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;transition:background .3s,border-color .3s}
    .dash-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--fire1),var(--fire2),var(--fire1),transparent)}
    .dash-logo{display:flex;align-items:center;gap:.5rem;font-size:.95rem;font-weight:900;letter-spacing:2px}
    .dash-logo span{background:linear-gradient(135deg,var(--fire2),var(--fire1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .user-badge{display:flex;align-items:center;gap:.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:.25rem .8rem .25rem .25rem;transition:background .3s}
    .user-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--fire1),var(--fire2));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff}
    .user-name{font-size:.8rem;font-weight:600}
    #scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    #scroll::-webkit-scrollbar{display:none}
    .page{display:none;padding:1rem;animation:fadein .2s ease}.page.active{display:block}
    @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .section-title{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:2.5px;margin-bottom:.7rem}

    /* CAPTEURS */
    .sensors-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
    .sensor-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem .9rem;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s,background .3s}
    .sensor-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--fire1),var(--fire2));transform:scaleX(0);transform-origin:left;transition:transform .4s}
    .sensor-card.alerte{border-color:var(--fire1);box-shadow:0 0 16px rgba(230,92,0,.2)}.sensor-card.alerte::before{transform:scaleX(1)}
    .sensor-card.feu{border-color:var(--ember);box-shadow:0 0 24px rgba(255,61,0,.3);animation:tremor .12s infinite}
    @keyframes tremor{0%,100%{transform:none}50%{transform:translateX(2px)}}
    .sc-icon{font-size:1.5rem;margin-bottom:.35rem;display:block}
    .sc-label{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:1.5px;margin-bottom:.3rem}
    .sc-value{font-family:'Share Tech Mono',monospace;font-size:1.8rem;font-weight:700;line-height:1;color:var(--text);transition:color .3s}
    .sc-value.danger{color:var(--ember)}.sc-value.warn{color:var(--fire2)}
    .sc-unit{font-size:.7rem;color:var(--muted)}
    .sc-state{font-size:.7rem;font-weight:600;margin-top:.3rem}
    .sc-state.ok{color:var(--green)}.sc-state.warn{color:var(--fire2)}.sc-state.bad{color:var(--ember)}
    .sc-bar{height:3px;background:var(--border);border-radius:2px;margin-top:.5rem}
    .sc-bar-f{height:100%;border-radius:2px;background:var(--green);transition:width .6s ease,background .3s}
    .flame-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;display:flex;align-items:center;gap:.9rem;margin-bottom:.75rem;transition:border-color .3s,box-shadow .3s,background .3s}
    .flame-card.fire{border-color:var(--ember);box-shadow:0 0 20px rgba(255,61,0,.25);animation:tremor .12s infinite}
    .flame-emoji{font-size:2.8rem;flex-shrink:0;transition:transform .3s}
    .flame-emoji.on{animation:dance .35s infinite alternate}
    @keyframes dance{from{transform:scale(1.08) rotate(-3deg)}to{transform:scale(1.22) rotate(3deg)}}
    .fi-label{font-family:'Share Tech Mono',monospace;font-size:.56rem;color:var(--muted);letter-spacing:1.5px}
    .fi-val{font-size:1rem;font-weight:700;margin-top:.2rem}
    .fi-val.ok{color:var(--green)}.fi-val.bad{color:var(--ember)}
    .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:.75rem}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:.85rem;transition:background .3s}
    .stat-label{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:1.5px}
    .stat-val{font-family:'Share Tech Mono',monospace;font-size:1.5rem;font-weight:700;margin-top:.2rem}
    .sync-row{text-align:center;font-family:'Share Tech Mono',monospace;font-size:.56rem;color:var(--muted);padding:.3rem 0 .5rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:.75rem;transition:background .3s}
    .card-title{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:2px;margin-bottom:.8rem}
    canvas{width:100%!important}
    .hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
    .hist-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--border)}
    .hist-item:last-child{border-bottom:none}
    .hi-date{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--muted)}
    .hi-vals{font-size:.82rem;font-weight:600;margin-top:.1rem}
    .hi-badge{font-family:'Share Tech Mono',monospace;font-size:.56rem;font-weight:700;padding:.15rem .5rem;border-radius:5px;border:1px solid;white-space:nowrap}
    .hi-badge.ok{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08)}
    .hi-badge.warn{border-color:var(--fire2);color:var(--fire2);background:rgba(249,168,37,.08)}
    .hi-badge.danger{border-color:var(--ember);color:var(--ember);background:rgba(255,61,0,.1)}
    .btn{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.82rem;border-radius:12px;border:none;font-family:'Exo 2',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s}
    .btn-fire{background:linear-gradient(135deg,var(--fire1),var(--fire2));color:#fff;box-shadow:0 4px 14px rgba(230,92,0,.3)}
    .btn-fire:active{transform:scale(.97)}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);margin-top:.6rem}
    .btn-outline:active{border-color:var(--fire1);color:var(--fire1)}
    .btn-sm{width:auto;padding:.35rem .85rem;font-size:.72rem;border-radius:8px;background:linear-gradient(135deg,var(--fire1),var(--fire2));color:#fff;border:none;font-family:'Exo 2',sans-serif;font-weight:700;cursor:pointer}
    .setting-row{display:flex;align-items:center;justify-content:space-between;padding:.82rem 0;border-bottom:1px solid var(--border)}
    .setting-row:last-child{border-bottom:none}
    .setting-label{font-size:.88rem;font-weight:600}
    .setting-sub{font-size:.7rem;color:var(--muted);margin-top:.1rem}
    .seuil-val{font-family:'Share Tech Mono',monospace;font-weight:700;font-size:.85rem;background:linear-gradient(135deg,var(--fire1),var(--fire2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .toggle{position:relative;width:44px;height:24px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-s{position:absolute;inset:0;background:var(--border);border-radius:999px;cursor:pointer;transition:background .3s}
    .toggle-s::before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .3s}
    .toggle input:checked+.toggle-s{background:var(--fire1)}
    .toggle input:checked+.toggle-s::before{transform:translateX(20px)}

    /* SÉLECTEUR THÈME */
    .theme-selector{display:flex;gap:.5rem;margin-top:.5rem}
    .theme-btn{flex:1;padding:.6rem .3rem;border-radius:10px;border:2px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-family:'Exo 2',sans-serif;font-size:.7rem;font-weight:700;text-align:center;transition:all .2s}
    .theme-btn:hover{border-color:var(--fire1);color:var(--fire1)}
    .theme-btn.active{border-color:var(--fire1);color:var(--fire1);background:rgba(230,92,0,.1)}
    .th-icon{font-size:1.3rem;display:block;margin-bottom:.2rem}

    /* VIDÉO */
    #video-section{margin-bottom:1rem}
    #live-video{width:100%;border-radius:12px;border:1px solid var(--border);background:#000}

    /* NAV */
    nav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:calc(env(safe-area-inset-bottom,0px) + .3rem);position:relative;transition:background .3s}
    nav::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--fire1),var(--fire2),var(--fire1),transparent)}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:.15rem;padding:.6rem .4rem .35rem;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:color .2s;font-family:'Exo 2',sans-serif;font-size:.56rem;font-weight:600;letter-spacing:.3px}
    .nav-icon{font-size:1.25rem;transition:transform .2s}
    .nav-btn.active{color:var(--fire1)}.nav-btn.active .nav-icon{transform:scale(1.15)}
    .nav-btn:active .nav-icon{transform:scale(.88)}
    #toast{position:fixed;bottom:calc(72px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(12px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.5rem 1.1rem;border-radius:999px;font-size:.78rem;white-space:nowrap;opacity:0;transition:all .3s;z-index:500;pointer-events:none}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--fire1);border-radius:50%;animation:spin .7s linear infinite;margin:1.5rem auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(min-width:768px){.sensors-grid{grid-template-columns:repeat(3,1fr)}.stats-grid{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
<div id="app">

  <!-- AUTH -->
  <div id="screen-auth" class="active">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="flame-svg-wrap">
          <svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" class="flame-svg">
            <defs>
              <radialGradient id="fg1" cx="50%" cy="80%" r="60%"><stop offset="0%" stop-color="#fff176"/><stop offset="40%" stop-color="#ff6d00"/><stop offset="100%" stop-color="#b71c1c" stop-opacity="0"/></radialGradient>
              <radialGradient id="fg2" cx="50%" cy="80%" r="50%"><stop offset="0%" stop-color="#ffffff"/><stop offset="30%" stop-color="#ffcc02"/><stop offset="100%" stop-color="#ff6d00" stop-opacity="0"/></radialGradient>
            </defs>
            <path class="flame-outer" d="M40 98 C10 85 5 65 15 45 C20 35 18 20 25 10 C28 22 25 30 30 38 C33 28 36 15 40 5 C44 15 47 28 50 38 C55 30 52 22 55 10 C62 20 60 35 65 45 C75 65 70 85 40 98Z" fill="url(#fg1)"/>
            <path class="flame-inner" d="M40 90 C22 78 20 62 28 48 C31 42 30 32 34 24 C36 32 34 40 38 46 C40 36 41 26 40 18 C44 26 45 36 47 46 C51 40 49 32 51 24 C55 32 54 42 57 48 C65 62 58 78 40 90Z" fill="url(#fg2)"/>
            <ellipse cx="40" cy="70" rx="8" ry="12" fill="white" opacity="0.6" class="flame-core"/>
          </svg>
        </div>
        <h1>SYSTÈME INTELLIGENT DE<br/>DÉTECTION D'INCENDIE<br/>EN TEMPS RÉEL</h1>
        <p>PLATEFORME IoT — ESP32 — SURVEILLANCE CONNECTÉE</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('connexion')">Se connecter</button>
        <button class="auth-tab" onclick="switchTab('inscription')">Créer un compte</button>
      </div>
      <div class="auth-form active" id="form-connexion">
        <div class="form-group"><label class="form-label">Adresse email</label><input type="email" class="form-input" id="login-email" placeholder="votre@email.com"/></div>
        <div class="form-group"><label class="form-label">Mot de passe</label><div class="input-wrap"><input type="password" class="form-input" id="login-mdp" placeholder="••••••••" style="padding-right:2.8rem" onkeydown="if(event.key==='Enter')seConnecter()"/><button class="eye-btn" type="button" onclick="toggleMdp('login-mdp',this)">👁️</button></div></div>
        <button class="btn-auth" onclick="seConnecter()" id="btn-login">🔐 Se connecter</button>
        <div class="auth-msg" id="msg-login"></div>
      </div>
      <div class="auth-form" id="form-inscription">
        <div class="form-group"><label class="form-label">Nom complet</label><input type="text" class="form-input" id="reg-nom" placeholder="Jean Dupont"/></div>
        <div class="form-group"><label class="form-label">Adresse email</label><input type="email" class="form-input" id="reg-email" placeholder="votre@email.com"/></div>
        <div class="form-group"><label class="form-label">Mot de passe (min. 8 caractères)</label><div class="input-wrap"><input type="password" class="form-input" id="reg-mdp" placeholder="••••••••" style="padding-right:2.8rem"/><button class="eye-btn" type="button" onclick="toggleMdp('reg-mdp',this)">👁️</button></div></div>
        <div class="form-group"><label class="form-label">Confirmer le mot de passe</label><div class="input-wrap"><input type="password" class="form-input" id="reg-mdp2" placeholder="••••••••" style="padding-right:2.8rem" onkeydown="if(event.key==='Enter')sInscrire()"/><button class="eye-btn" type="button" onclick="toggleMdp('reg-mdp2',this)">👁️</button></div></div>
        <button class="btn-auth" onclick="sInscrire()" id="btn-register">✅ Créer mon compte</button>
        <div class="auth-msg" id="msg-register"></div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="screen-dashboard">
    <div id="banner">🔥 INCENDIE DÉTECTÉ — ÉVACUEZ IMMÉDIATEMENT 🔥</div>
    <head
